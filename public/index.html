<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0C1B3A" />
    <meta name="description" content="SICC Admin — Salem International Christian Centre" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="SICC Admin" />
    <link rel="apple-touch-icon" href="/salem-logo.png" />
    <link rel="icon" type="image/png" href="/salem-logo.png" />
    <link rel="shortcut icon" href="/salem-logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>SICC Admin — Salem International Christian Centre</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #F0F2F5; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; color: #0D1B2A; -webkit-font-smoothing: antialiased; }
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #B0BEC5; border-radius: 4px; }
      input:focus, select:focus, textarea:focus { border-color: #185FA5 !important; box-shadow: 0 0 0 3px rgba(24,95,165,0.1) !important; }
      button:active:not(:disabled) { opacity: 0.85; transform: scale(0.98); }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes load { 0% { transform: translateX(-100%); } 100% { transform: translateX(400%); } }
      ::selection { background: rgba(24,95,165,0.15); }
      input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

      @media (max-width: 860px) {
        body { overflow-x: hidden; }
        button, input, select, textarea { max-width: 100%; }

        .sicc-grid,
        div[style*="grid-template-columns: 1fr 1fr"],
        div[style*="grid-template-columns: 1fr 1fr 1fr"],
        div[style*="grid-template-columns: repeat(auto-fill, minmax(300px"],
        div[style*="grid-template-columns: repeat(auto-fill, minmax(270px"],
        div[style*="grid-template-columns: repeat(auto-fill, minmax(250px"],
        div[style*="grid-template-columns: repeat(auto-fit, minmax(280px"],
        div[style*="grid-template-columns: repeat(auto-fit, minmax(260px"] {
          grid-template-columns: minmax(0, 1fr) !important;
          gap: 12px !important;
        }

        .sicc-panel {
          padding: 14px !important;
          border-radius: 10px !important;
        }

        .sicc-stat-card {
          padding: 14px !important;
          border-radius: 10px !important;
        }

        .sicc-table-wrap {
          margin-inline: -2px;
          padding-bottom: 4px;
          -webkit-overflow-scrolling: touch;
        }
      }

      @media (min-width: 641px) and (max-width: 860px) {
        .sicc-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
